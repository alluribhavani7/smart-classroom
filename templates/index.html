<!DOCTYPE html>
<html>
<head>
    <title>Smart Classroom</title>
</head>
<body>

<h1>Smart Classroom Attention System</h1>

<form method="POST" enctype="multipart/form-data">
    <input type="file" name="image" required>
    <button type="submit">Check Attention</button>
</form>

{% if result %}
    <h2>Result: {{ result }}</h2>
    <img src="{{ image_path }}" width="300">
{% endif %}

</body>
</html>
